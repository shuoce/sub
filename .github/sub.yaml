name: Generate Clash Meta

on:
  push:
    paths:
      - "sub.txt"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download SubConverter
        run: |
          wget -O subconverter.tar.gz \
          https://github.com/tindy2013/subconverter/releases/latest/download/subconverter_linux64.tar.gz

          tar -zxvf subconverter.tar.gz

      - name: Generate Clash Config
        run: |
          URL=$(cat sub.txt | paste -sd "|" -)

          ./subconverter/subconverter \
          -g \
          --artifact clash \
          --url "$URL"

      - name: Rename Output
        run: |
          find . -name "*.yaml"

          cp clash.yaml clash-meta.yaml || true

      - name: Commit Files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          git commit -m "Auto update clash config" || exit 0

          git push
