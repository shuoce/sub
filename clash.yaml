proxy-groups:
  - name: "🌍 自动选择"
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    proxies:
      - 🇺🇸美国_专线_中性|峰-02
      - 🇭🇰香港_专线|峰-01
      - 🇹🇼台湾_专线|峰-01
      - 🇯🇵日本_专线_中性|峰-01
      - 🇸🇬新加坡_专线|峰-01
      - 🇰🇷韩国_专线|峰-01
      - 🇩🇪德国_专线|峰-01
      - 🇮🇳印度_专线|峰-01
      - 🇺🇦乌克兰_原生|峰-01

  - name: "🇺🇸 美国节点"
    type: select
    proxies:
      - 🇺🇸美国_专线|峰-01
      - 🇺🇸美国_专线_中性|峰-02
      - 🇺🇸美国_专线|峰-03

  - name: "🇭🇰 香港节点"
    type: select
    proxies:
      - 🇭🇰香港_专线|峰-01

  - name: "🇹🇼 台湾节点"
    type: select
    proxies:
      - 🇹🇼台湾_专线|峰-01
      - 🇹🇼台湾_家宽_极纯|峰-01

  - name: "🌍 全局节点"
    type: select
    proxies:
      - 🌍 自动选择
      - 🇺🇸 美国节点
      - 🇭🇰 香港节点
      - 🇹🇼 台湾节点
      - 🇯🇵日本_专线_中性|峰-01
      - 🇸🇬新加坡_专线|峰-01
      - 🇰🇷韩国_专线|峰-01
      - 🇩🇪德国_专线|峰-01
      - 🇮🇳印度_专线|峰-01
      - 🇺🇦乌克兰_原生|峰-01

rules:
  - GEOIP,CN,DIRECT
  - GEOIP,LAN,DIRECT
  - MATCH,🌍 全局节点
