<!DOCTYPE html>
<html lang="zh-CN">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>硕策订阅中心</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="subscribe-box">

<h1>🚀 硕策订阅中心</h1>


<div class="sub-item">

<div>
<h3>📱 NekoBox订阅</h3>

<p id="nekobox">
https://shuoce.github.io/sub/sub.txt
</p>

</div>

<button onclick="copyText('nekobox')">
复制
</button>

</div>



<div class="sub-item">

<div>
<h3>🌐 Clash通用订阅</h3>

<p id="clash">
https://shuoce.github.io/sub/share/synchronous
</p>

</div>

<button onclick="copyText('clash')">
复制
</button>

</div>




<div class="sub-item">

<div>
<h3>📲 NekoBox临时分享订阅</h3>

<p id="mao">
https://shuoce.github.io/sub/share/mao.txt
</p>

</div>

<button onclick="copyText('mao')">
复制
</button>

</div>



</div>



<script>

function copyText(id){

let text=document.getElementById(id).innerText;


navigator.clipboard.writeText(text)
.then(()=>{

alert("订阅地址复制成功");

});


}

</script>



</body>

</html>
