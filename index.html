<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订阅服务器 - Sub</title>
    <style>
        :root {
            --bg: linear-gradient(135deg, #1e1e2f, #2a2a40);
            --card: rgba(255,255,255,0.08);
            --text: #e0e0e0;
            --accent: #00ff9d;
        }
        [data-theme="light"] {
            --bg: linear-gradient(135deg, #f0f2f5, #ffffff);
            --card: rgba(0,0,0,0.06);
            --text: #333;
            --accent: #00c17c;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.4s;
        }
        .container {
            max-width: 820px;
            margin: 40px auto;
            padding: 30px;
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
            text-align: center;
        }
        h1 { color: var(--accent); margin-bottom: 8px; }
        .subtitle { color: #888; margin-bottom: 40px; font-size: 1.1em; }
        
        .link-card {
            display: inline-block;
            background: var(--card);
            border: 1px solid var(--accent);
            border-radius: 12px;
            padding: 20px 30px;
            margin: 12px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.3s;
            min-width: 280px;
        }
        .link-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 25px rgba(0,255,150,0.2);
        }
        .link-card h3 { margin: 0 0 8px 0; color: var(--accent); }
        
        .toggle-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.3);
            border: none;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            z-index: 100;
        }
        [data-theme="light"] .toggle-btn { background: rgba(255,255,255,0.7); color: #333; }

        .qr {
            margin: 30px 0;
        }
        footer {
            margin-top: 50px;
            color: #666;
            font-size: 0.95em;
        }
    </style>
</head>
<body data-theme="dark">
    <button class="toggle-btn" onclick="toggleTheme()">☀️</button>

    <div class="container">
        <h1>🚀 订阅服务器</h1>
        <p class="subtitle">稳定 · 快速 · 免费订阅服务</p>
        
        <a href="sub.txt" class="link-card">
            <h3>📄 通用订阅 (Base64)</h3>
            <p>https://raw.githubusercontent.com/shuoce/sub/main/sub.txt</p>
        </a>
        
        <a href="clash.yaml" class="link-card">
            <h3>⚔️ Clash 配置</h3>
            <p>https://raw.githubusercontent.com/shuoce/sub/main/clash.yaml</p>
        </a>

        <div class="qr">
            <p>📱 手机扫码快速订阅</p>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://raw.githubusercontent.com/shuoce/sub/main/sub.txt" alt="订阅二维码">
        </div>

        <footer>
            GitHub: <a href="https://github.com/shuoce/sub" style="color:var(--accent);">shuoce/sub</a><br>
            欢迎 Star 支持项目！
        </footer>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const current = body.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            
            const btn = document.querySelector('.toggle-btn');
            btn.textContent = newTheme === 'dark' ? '☀️' : '🌙';
        }

        // 记住用户偏好
        window.onload = () => {
            const saved = localStorage.getItem('theme');
            if (saved) {
                document.body.setAttribute('data-theme', saved);
                document.querySelector('.toggle-btn').textContent = saved === 'dark' ? '☀️' : '🌙';
            }
        };
    </script>
</body>
</html>
